<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>思维导图文件管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f5f5f5;padding:16px;height:100vh;display:flex;flex-direction:column}
h3{font-size:16px;color:#333;margin-bottom:12px}
.toolbar{display:flex;gap:8px;margin-bottom:12px}
.toolbar input{flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px;font-family:inherit}
.toolbar button{padding:6px 14px;border-radius:4px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:13px;font-family:inherit}
.toolbar button.primary{background:#4A90D9;color:#fff;border-color:#4A90D9}
.toolbar button.primary:hover{background:#3a7bc8}
.toolbar button:disabled{opacity:0.5;cursor:not-allowed}
.file-list{flex:1;overflow-y:auto;background:#fff;border-radius:6px;border:1px solid #e0e0e0;padding:8px}
.file-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:6px;margin-bottom:4px;background:#f8f9fa;cursor:pointer;transition:background .15s}
.file-item:hover{background:#e8f0fe}
.file-item .file-name{font-size:13px;color:#333;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .file-status{font-size:11px;color:#666;margin-left:8px;white-space:nowrap}
.file-item .file-time{font-size:11px;color:#999;margin-left:8px;white-space:nowrap}
.file-item .file-del{font-size:12px;color:#e74c3c;cursor:pointer;margin-left:8px;padding:2px 6px;border-radius:3px}
.file-item .file-del:hover{background:#fef0ef}
.file-item.selected{background:#fff3cd;border:1px solid #f0ad4e}
.empty{text-align:center;color:#999;padding:30px 0;font-size:13px}
.sync-status{font-size:11px;color:#666;margin-top:8px;padding:6px 10px;background:#fff;border-radius:4px;border:1px solid #e0e0e0}
.sync-status.error{color:#e74c3c;border-color:#e74c3c}
.sync-status.success{color:#27ae60;border-color:#27ae60}
.network-test{font-size:11px;color:#999;margin-top:4px;padding:4px 8px;background:#fafafa;border-radius:3px}
</style>
</head>
<body>
<h3>📁 文件管理</h3>
<div class="toolbar">
  <button id="openBtn" onclick="openSelectedFile()" disabled>📂 打开选中文件</button>
  <button id="syncBtn" onclick="oneClickSync()">🔄 一键同步</button>
</div>
<div class="network-test" id="networkStatus">🔍 正在检测网络连接...</div>
<div class="file-list" id="fileList"></div>
<div class="sync-status" id="syncStatus">就绪</div>

<script>
const SYNC_CONFIG_KEY = 'mindmap_sync_config';
const NETWORK_TEST_KEY = 'mindmap_network_test';

// 只使用腾讯云函数转发
const PRIMARY_API_URLS = [
  'https://1408347752-dxgsap4qrj.ap-guangzhou.tencentscf.com'  // 腾讯云函数
];
const FALLBACK_API_URLS = [];  // 不使用Workers兜底

// ==================== 网络检测模块 ====================
let workingApiUrl = null;
let networkTestResult = null;

// ==================== 云同步模块 ====================
const DEFAULT_SYNC_CONFIG = {
  enabled: true,
  webhookUrl: 'https://www.kdocs.cn/api/v3/ide/file/ctRsEvOpYZky/script/V2-1cf9aRSXUlNao8Qhjk4ATb/sync_task',
  token: '',
  sheetName: '自用脑图',
  retryCount: 3,
  retryInterval: 2
};

async function testNetworkConnectivity() {
  const statusEl = document.getElementById('networkStatus');
  
  console.log('[网络检测] 开始');
  
  try {
    const cached = localStorage.getItem(NETWORK_TEST_KEY);
    if (cached) {
      const data = JSON.parse(cached);
      if (Date.now() - data.time < 5 * 60 * 1000) {
        workingApiUrl = data.url;
        statusEl.textContent = `✅ 网络正常 | 使用: ${new URL(data.url).hostname}`;
        console.log('[网络检测] 使用缓存URL:', data.url);
        return true;
      }
    }
  } catch(e) {
    console.log('[网络检测] 缓存解析失败:', e);
  }

  statusEl.textContent = '🔍 正在测试API地址...';
  
  const allUrls = [...PRIMARY_API_URLS, ...FALLBACK_API_URLS];
  
  if (allUrls.length === 0) {
    statusEl.textContent = '❌ 无可用API地址';
    statusEl.style.color = '#e74c3c';
    return false;
  }
  
  for (const url of allUrls) {
    try {
      console.log('[网络检测] 测试:', url);
      
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 3000);
      
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          webhookUrl: 'https://www.kdocs.cn/api/v3/ide/file/ctRsEvOpYZky/script/V2-1cf9aRSXUlNao8Qhjk4ATb/sync_task',
          message: { 
            Context: { 
              argv: { 
                表格名: '自用脑图',
                操作: '获取表头'
              } 
            } 
          }
        }),
        signal: controller.signal
      });
      
      clearTimeout(timeoutId);
      
      if (!response.ok) {
        console.log('[网络检测] HTTP错误:', response.status);
        continue;
      }
      
      const result = await Promise.race([
        response.json(),
        new Promise((_, reject) => setTimeout(() => reject(new Error('JSON超时')), 2000))
      ]);
      
      const r = result.data?.result || result;
      if (r.status === 'success') {
        workingApiUrl = url;
        const hostname = new URL(url).hostname;
        statusEl.textContent = `✅ 网络正常 | 使用: ${hostname}`;
        statusEl.style.color = '';
        
        localStorage.setItem(NETWORK_TEST_KEY, JSON.stringify({
          url: url,
          time: Date.now()
        }));
        
        console.log('[网络检测] 成功:', url);
        return true;
      }
    } catch (e) {
      console.log('[网络检测] 失败:', url, '-', e.message);
    }
  }

  statusEl.textContent = '❌ 所有API均不可用';
  statusEl.style.color = '#e74c3c';
  console.log('[网络检测] 所有地址均失败');
  return false;
}

// ==================== 云同步模块 ====================
function getSyncConfig() {
  try {
    const saved = localStorage.getItem(SYNC_CONFIG_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      return { ...DEFAULT_SYNC_CONFIG, ...parsed };
    }
    return { ...DEFAULT_SYNC_CONFIG };
  } catch (e) { 
    return { ...DEFAULT_SYNC_CONFIG }; 
  }
}

async function callCloudAPI(action, params = {}) {
  const config = getSyncConfig();
  if (!config || !config.enabled) {
    return { status: 'error', message: '云同步未启用' };
  }

  const payload = {
    webhookUrl: config.webhookUrl,
    message: {
      Context: {
        argv: {
          表格名: config.sheetName || '自用脑图',
          操作: action,
          ...params
        }
      }
    }
  };

  const headers = { 'Content-Type': 'application/json' };
  if (config.token) headers['AirScript-Token'] = config.token;

  // 优先使用已测试可用的URL
  const urlsToTry = workingApiUrl ? [workingApiUrl] : [];
  // 然后添加其他PRIMARY URLs
  for (const url of PRIMARY_API_URLS) {
    if (!urlsToTry.includes(url)) urlsToTry.push(url);
  }
  // 最后添加fallback
  for (const url of FALLBACK_API_URLS) {
    if (!urlsToTry.includes(url)) urlsToTry.push(url);
  }

  const maxRetries = config.retryCount || 3;
  const retryInterval = config.retryInterval || 2;

  for (const apiUrl of urlsToTry) {
    let lastError = null;
    for (let attempt = 0; attempt < maxRetries; attempt++) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);
        
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: headers,
          body: JSON.stringify(payload),
          signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const result = await response.json();
        const r = result.data?.result || result;
        
        if (r.status === 'success') {
          // 更新workingApiUrl
          if (workingApiUrl !== apiUrl) {
            workingApiUrl = apiUrl;
            localStorage.setItem(NETWORK_TEST_KEY, JSON.stringify({
              url: apiUrl,
              time: Date.now()
            }));
          }
          return r;
        }
        
        // 如果是明确的业务错误（非网络错误），直接返回
        if (r.tongzhi && !r.tongzhi.includes('网络') && !r.tongzhi.includes('超时')) {
          return r;
        }
        
        lastError = new Error(r.tongzhi || r.message || '未知错误');
      } catch (error) {
        lastError = error;
      }
      
      if (attempt < maxRetries - 1) {
        await new Promise(resolve => setTimeout(resolve, retryInterval * 1000));
      }
    }
  }
  
  return { status: 'error', message: lastError?.message || '所有云函数地址均不可用' };
}

// ==================== 本地存储模块 ====================
function getFileIndex(){
  try{return JSON.parse(localStorage.getItem('mindmap_file_index')||'[]')}catch(e){return[]}
}
function setFileIndex(idx){try{localStorage.setItem('mindmap_file_index',JSON.stringify(idx))}catch(e){}}
function loadFileData(name){
  try{
    const raw=localStorage.getItem('mindmap_file_'+name);
    if(!raw)return null;
    return JSON.parse(raw);
  }catch(e){return null}
}
function deleteFileData(name){
  const idx=getFileIndex().filter(f=>f.name!==name);
  setFileIndex(idx);
  localStorage.removeItem('mindmap_file_'+name);
}
function saveFileData(name,data){
  const idx=getFileIndex();
  const existing=idx.find(f=>f.name===name);
  if(existing){existing.time=Date.now()}else{idx.push({name,time:Date.now()})}
  setFileIndex(idx);
  try{localStorage.setItem('mindmap_file_'+name,JSON.stringify({data,view:{zoom:1,panX:0,panY:0}}))}catch(e){}
}

// ==================== 云端文件获取 ====================
async function getCloudFiles() {
  const result = await callCloudAPI('读取全部');
  if (result.status === 'success' && result.数据) {
    return result.数据.filter(row => row.文件名 && row.文件名 !== '');
  }
  return [];
}

async function findFileByName(fileName) {
  const files = await getCloudFiles();
  return files.find(f => f.文件名 === fileName);
}

async function deleteCloudFile(fileName) {
  const existing = await findFileByName(fileName);
  if (!existing || !existing._行号) {
    return { status: 'error', message: '云端无此文件' };
  }
  
  const rowNum = existing._行号;
  const result = await callCloudAPI('批量写入', {
    行号: rowNum,
    数据: {
      文件名: '',
      内容: '',
      版本号: '',
      更新时间: ''
    }
  });
  
  if (result.status === 'success') {
    localStorage.removeItem('mindmap_file_' + fileName);
    const idx = getFileIndex().filter(f => f.name !== fileName);
    setFileIndex(idx);
    renderFileList();
    return { status: 'success', message: '已删除' };
  }
  
  return { status: 'error', message: result.tongzhi || '删除失败' };
}

async function renameCloudFile(oldName, newName) {
  const existing = await findFileByName(oldName);
  
  if (!existing || !existing._行号) {
    // 云端无此文件，仅本地重命名
    const localData = localStorage.getItem('mindmap_file_' + oldName);
    if (localData) {
      localStorage.setItem('mindmap_file_' + newName, localData);
      localStorage.removeItem('mindmap_file_' + oldName);
      
      const idx = getFileIndex();
      const item = idx.find(f => f.name === oldName);
      if (item) item.name = newName;
      setFileIndex(idx);
      
      const current = localStorage.getItem('mindmap_current_file');
      if (current === oldName) {
        localStorage.setItem('mindmap_current_file', newName);
      }
      
      renderFileList();
      return { status: 'success', message: '仅本地' };
    }
    return { status: 'error', message: '文件不存在' };
  }
  
  // 云端有此文件，先写入新名称
  const rowNum = existing._行号;
  const result = await callCloudAPI('批量写入', {
    行号: rowNum,
    数据: {
      文件名: newName,
      内容: existing.内容 || '',
      版本号: existing.版本号 || '0',
      更新时间: new Date().toISOString().slice(0, 19).replace('T', ' ')
    }
  });
  
  if (result.status === 'success') {
    // 更新本地缓存
    const localData = localStorage.getItem('mindmap_file_' + oldName);
    if (localData) {
      localStorage.setItem('mindmap_file_' + newName, localData);
      localStorage.removeItem('mindmap_file_' + oldName);
    }
    
    const idx = getFileIndex();
    const item = idx.find(f => f.name === oldName);
    if (item) item.name = newName;
    setFileIndex(idx);
    
    const current = localStorage.getItem('mindmap_current_file');
    if (current === oldName) {
      localStorage.setItem('mindmap_current_file', newName);
    }
    
    renderFileList();
    return { status: 'success', message: '已重命名' };
  }
  
  return { status: 'error', message: result.tongzhi || '重命名失败' };
}

async function oneClickSync() {
  const status = document.getElementById('syncStatus');
  const syncBtn = document.getElementById('syncBtn');
  
  syncBtn.disabled = true;
  syncBtn.textContent = '⏳ 同步中...';
  status.className = 'sync-status';
  status.textContent = '🔄 开始一键同步...';
  
  try {
    // 步骤1：检测网络
    status.textContent = '🔍 检测网络...';
    const networkOk = await testNetworkConnectivity();
    if (!networkOk) {
      status.className = 'sync-status error';
      status.textContent = '❌ 网络连接失败';
      return;
    }
    
    // 步骤2：拉取云端
    status.textContent = '📥 拉取云端文件...';
    const cloudFiles = await getCloudFiles();
    const localIdx = getFileIndex();
    let pulled = 0;
    
    for (const cf of cloudFiles) {
      if (!cf.文件名) continue;
      const existing = localIdx.find(f => f.name === cf.文件名);
      if (!existing) {
        localIdx.push({ name: cf.文件名, time: Date.now() });
        pulled++;
      }
      if (cf.内容) {
        localStorage.setItem('mindmap_file_' + cf.文件名, JSON.stringify({
          data: cf.内容,
          view: { zoom: 1, panX: 0, panY: 0 }
        }));
      }
    }
    setFileIndex(localIdx);
    
    // 步骤3：上传本地未上传的文件
    status.textContent = '📤 上传本地文件...';
    let uploaded = 0;
    const cloudNames = new Set(cloudFiles.map(f => f.文件名));
    
    for (const lf of localIdx) {
      if (!cloudNames.has(lf.name)) {
        const localData = localStorage.getItem('mindmap_file_' + lf.name);
        if (localData) {
          const parsed = JSON.parse(localData);
          await callCloudAPI('追加', {
            数据: {
              文件名: lf.name,
              内容: parsed.data || '',
              版本号: '0',
              更新时间: new Date().toISOString().slice(0, 19).replace('T', ' ')
            }
          });
          uploaded++;
        }
      }
    }
    
    renderFileList();
    
    status.className = 'sync-status success';
    status.textContent = `✅ 同步完成 | 拉取: ${pulled} | 上传: ${uploaded}`;
    
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'syncComplete', pulled, uploaded }, '*');
    }
  } catch (error) {
    status.className = 'sync-status error';
    status.textContent = `❌ 同步失败: ${error.message}`;
  } finally {
    syncBtn.disabled = false;
    syncBtn.textContent = '🔄 一键同步';
  }
}

// ==================== 渲染文件列表 ====================
let selectedFileName = null;

function renderFileList(){
  const list=document.getElementById('fileList');
  const idx=getFileIndex().sort((a,b)=>b.time-a.time);
  if(idx.length===0){list.innerHTML='<div class="empty">暂无保存的文件</div>';return}
  const currentFile = localStorage.getItem('mindmap_current_file') || '';
  list.innerHTML=idx.map(f=>{
    const d=new Date(f.time);
    const ts=d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    const selected=f.name===selectedFileName?' selected':'';
    const enc=encodeURIComponent(f.name);
    const cloudStatus = localStorage.getItem('mindmap_file_' + f.name) ? '☁️ 已上云' : '📁 仅本地';
    return `<div class="file-item${selected}" data-name="${enc}">
      <span class="file-name">📄 ${f.name}</span>
      <span class="file-status">${cloudStatus}</span>
      <span class="file-time">${ts}</span>
      <span class="file-del" data-del="${enc}">✕</span>
    </div>`;
  }).join('');
}

function openSelectedFile(){
  if(!selectedFileName){alert('请先选择文件');return}
  console.log('[文件管理] 打开选中文件:', selectedFileName);
  if(window.parent!==window){
    window.parent.postMessage({type:'openFile',name:selectedFileName},'*');
  } else {
    openNamedFile(selectedFileName);
  }
}

// ==================== 事件处理 ====================
document.getElementById('fileList').addEventListener('click', async function(e){
  const del=e.target.closest('[data-del]');
  if(del){
    e.stopPropagation();
    const name = decodeURIComponent(del.getAttribute('data-del'));
    if(confirm('确定删除 "'+name+'" ？')){
      const status = document.getElementById('syncStatus');
      status.className = 'sync-status';
      status.textContent = '🗑️ 正在删除...';
      
      const result = await deleteCloudFile(name);
      
      localStorage.removeItem('mindmap_file_' + name);
      const idx = getFileIndex().filter(f => f.name !== name);
      setFileIndex(idx);
      renderFileList();
      
      const current = localStorage.getItem('mindmap_current_file');
      if(current === name){
        localStorage.removeItem('mindmap_current_file');
      }
      
      if (result.status === 'success') {
        status.className = 'sync-status success';
        status.textContent = `✅ 已删除: ${name}（含云端）`;
        if(window.parent!==window) window.parent.postMessage({type:'fileDeleted',name},'*');
      } else if (result.message === '云端无此文件') {
        status.className = 'sync-status success';
        status.textContent = `✅ 已删除: ${name}（仅本地）`;
        if(window.parent!==window) window.parent.postMessage({type:'fileDeleted',name},'*');
      } else {
        status.className = 'sync-status error';
        status.textContent = `⚠️ 已删除本地，云端删除失败: ${result.message}`;
      }
    }
    return;
  }
  
  const item=e.target.closest('.file-item');
  if(item){
    const name = decodeURIComponent(item.getAttribute('data-name'));
    selectedFileName = name;
    const openBtn = document.getElementById('openBtn');
    openBtn.disabled = false;
    renderFileList();
  }
});

// ==================== 刷新云端（核心功能） ====================
async function refreshCloudFiles(){
  const status = document.getElementById('syncStatus');
  const refreshBtn = document.getElementById('refreshBtn');
  
  console.log('[刷新云端] 开始执行');
  
  refreshBtn.disabled = true;
  refreshBtn.textContent = '⏳ 刷新中...';
  
  try {
    // 步骤1：先检测网络
    status.className = 'sync-status';
    status.textContent = '🔍 正在检测网络连接...';
    
    console.log('[刷新云端] 步骤1：检测网络');
    const networkOk = await testNetworkConnectivity();
    console.log('[刷新云端] 网络检测结果:', networkOk);
    
    if (!networkOk) {
      status.className = 'sync-status error';
      status.textContent = '❌ 网络连接失败，请检查网络后重试';
      return;
    }
    
    // 步骤2：获取云端文件
    status.textContent = '📡 正在获取云端文件列表...';
    
    console.log('[刷新云端] 步骤2：获取云端文件');
    const files = await getCloudFiles();
    console.log('[刷新云端] 获取到文件数量:', files.length);
    
    if (files.length === 0) {
      status.className = 'sync-status';
      status.textContent = '☁️ 云端暂无文件';
      return;
    }
    
    // 步骤3：合并到本地
    status.textContent = `📥 正在同步 ${files.length} 个云端文件...`;
    
    console.log('[刷新云端] 步骤3：合并到本地');
    const idx = getFileIndex();
    let updated = 0;
    let added = 0;
    
    for (const cf of files) {
      if (!cf.文件名) continue;
      
      const existing = idx.find(f => f.name === cf.文件名);
      if (existing) {
        existing.time = Date.now();
        updated++;
      } else {
        idx.push({ name: cf.文件名, time: Date.now() });
        added++;
      }
      
      if (cf.内容) {
        localStorage.setItem('mindmap_file_' + cf.文件名, JSON.stringify({
          data: cf.内容,
          view: { zoom: 1, panX: 0, panY: 0 }
        }));
      }
    }
    
    setFileIndex(idx);
    renderFileList();
    
    status.className = 'sync-status success';
    status.textContent = `✅ 同步完成 | 云端: ${files.length} | 新增: ${added} | 更新: ${updated}`;
    
    if (window.parent !== window) {
      window.parent.postMessage({
        type: 'cloudFilesRefreshed',
        count: files.length,
        added: added,
        updated: updated
      }, '*');
    }
    
    console.log('[刷新云端] 完成');
    
  } catch (error) {
    console.error('[刷新云端] 错误:', error);
    status.className = 'sync-status error';
    status.textContent = `❌ 刷新失败: ${error.message}`;
  } finally {
    refreshBtn.disabled = false;
    refreshBtn.textContent = '☁️ 刷新云端';
  }
}

// ==================== 初始化 ====================
window.addEventListener('load', async () => {
  renderFileList();
  
  // 页面加载时自动检测网络
  await testNetworkConnectivity();
});

// ==================== 监听父页面消息（核心委托机制） ====================
window.addEventListener('message', async (e) => {
  const data = e.data;
  const requestId = data.requestId || Date.now();
  
  try {
    switch (data.type) {
      case 'refreshCloud':
        await refreshCloudFiles();
        break;
        
      case 'testNetwork':
        const ok = await testNetworkConnectivity();
        postToParent({ type: 'networkTestResult', ok, requestId });
        break;
        
      case 'cloudAPI':
        const apiResult = await callCloudAPI(data.action, data.params || {});
        postToParent({ type: 'cloudAPIResult', result: apiResult, requestId });
        break;
        
      case 'findFile':
        const files = await getCloudFiles();
        const found = files.find(f => f.文件名 === data.fileName);
        postToParent({ type: 'findFileResult', file: found || null, requestId });
        break;
        
      case 'uploadFile':
        const uploadResult = await uploadFileToCloud(data.fileName, data.content, data.version);
        postToParent({ type: 'uploadFileResult', result: uploadResult, requestId });
        break;
        
      case 'downloadFile':
        const downloadResult = await downloadFileFromCloud(data.fileName);
        postToParent({ type: 'downloadFileResult', result: downloadResult, requestId });
        break;
        
      case 'getCloudVersion':
        const versionResult = await getCloudFileVersion(data.fileName);
        postToParent({ type: 'getCloudVersionResult', version: versionResult, requestId });
        break;
        
      case 'renameFile':
        const renameResult = await renameCloudFile(data.oldName, data.newName);
        postToParent({ type: 'renameFileResult', result: renameResult, requestId });
        break;
        
      case 'deleteFile':
        const deleteResult = await deleteCloudFile(data.fileName);
        postToParent({ type: 'deleteFileResult', result: deleteResult, requestId });
        break;
        
      case 'initTable':
        const initResult = await initCloudTable();
        postToParent({ type: 'initTableResult', result: initResult, requestId });
        break;
    }
  } catch (error) {
    postToParent({ type: 'error', message: error.message, requestId });
  }
});

function postToParent(message) {
  if (window.parent !== window) {
    window.parent.postMessage(message, '*');
  }
}

// ==================== 云端操作API ====================
async function uploadFileToCloud(fileName, content, version) {
  const existing = await findFileByName(fileName);
  if (existing && existing._行号) {
    return await callCloudAPI('批量写入', {
      行号: existing._行号,
      数据: {
        文件名: fileName,
        内容: content,
        版本号: version.toString(),
        更新时间: new Date().toISOString()
      }
    });
  } else {
    const dimResult = await callCloudAPI('获取维度');
    const newRow = dimResult.status === 'success' ? dimResult.最大行 + 1 : 2;
    return await callCloudAPI('批量写入', {
      行号: newRow,
      数据: {
        文件名: fileName,
        内容: content,
        版本号: version.toString(),
        更新时间: new Date().toISOString()
      }
    });
  }
}

async function downloadFileFromCloud(fileName) {
  const files = await getCloudFiles();
  const file = files.find(f => f.文件名 === fileName);
  if (!file) {
    return { status: 'error', message: '云端无此文件' };
  }
  return { status: 'success', content: file.内容, version: parseInt(file.版本号 || '0') };
}

async function getCloudFileVersion(fileName) {
  const files = await getCloudFiles();
  const file = files.find(f => f.文件名 === fileName);
  return file ? parseInt(file.版本号 || '0') : 0;
}

async function renameCloudFile(oldName, newName) {
  const existing = await findFileByName(oldName);
  if (!existing || !existing._行号) {
    return { status: 'error', message: '文件不存在' };
  }
  return await callCloudAPI('批量写入', {
    行号: existing._行号,
    数据: {
      文件名: newName,
      更新时间: new Date().toISOString()
    }
  });
}

async function deleteCloudFile(fileName) {
  const existing = await findFileByName(fileName);
  if (!existing || !existing._行号) {
    return { status: 'error', message: '云端无此文件' };
  }
  
  // 直接删除云端行（WPS脚本不支持删除行操作，改为清空内容）
  const rowNum = existing._行号;
  const result = await callCloudAPI('批量写入', {
    行号: rowNum,
    数据: {
      文件名: '',
      内容: '',
      版本号: '',
      更新时间: ''
    }
  });
  
  if (result.status === 'success') {
    // 同时删除本地缓存
    localStorage.removeItem('mindmap_file_' + fileName);
    const idx = getFileIndex().filter(f => f.name !== fileName);
    setFileIndex(idx);
    renderFileList();
    return { status: 'success', message: '已删除' };
  }
  
  return { status: 'error', message: result.tongzhi || '删除失败' };
}

async function initCloudTable() {
  const requiredHeaders = ['文件名', '内容', '版本号', '更新时间'];
  const headersResult = await callCloudAPI('获取表头');
  if (headersResult.status === 'success') {
    const existingHeaders = headersResult.表头 || [];
    const missing = requiredHeaders.filter(h => !existingHeaders.includes(h));
    if (missing.length === 0) {
      return { status: 'success', message: '表头已完整' };
    }
  }
  return await callCloudAPI('初始化表头', { 表头: requiredHeaders });
}

async function findFileByName(fileName) {
  const result = await callCloudAPI('查找', { 列名: '文件名', 关键字: fileName });
  if (result.status === 'success' && result.匹配数 > 0) {
    return result.数据[0];
  }
  return null;
}
